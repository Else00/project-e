name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install browser runtime
        run: bunx playwright install --with-deps chromium

      - name: Verify app
        run: bun run check

      - name: Build Pages artifact
        run: VITE_BASE_PATH=/project-e/ bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Remove older Pages deployments
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          index=0
          gh api "repos/$REPO/deployments?environment=github-pages&per_page=100" --jq '.[].id' | while read -r deployment_id; do
            test -n "$deployment_id" || continue
            index=$((index + 1))
            if [ "$index" -eq 1 ]; then
              continue
            fi
            gh api -X POST "repos/$REPO/deployments/$deployment_id/statuses" \
              -f state=inactive \
              -f environment=github-pages \
              -f auto_inactive=false >/dev/null || true
            gh api -X DELETE "repos/$REPO/deployments/$deployment_id" >/dev/null || true
            echo "Deleted old github-pages deployment $deployment_id"
          done
